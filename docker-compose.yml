---
volumes:
  postgres-data:
  npm-cache:

services:
  init-libs:
    container_name: init-libs
    image: node:24.1.0-bookworm-slim
    volumes:
      - .:/app:z
      - npm-cache:/root/.npm:z
      - /app/libs/node_modules
    working_dir: /app/libs
    entrypoint: ["npm", "ci", "--ignore-scripts"]

  admin:
    container_name: admin
    depends_on:
      api:
        condition: service_healthy
      init-libs:
        condition: service_completed_successfully
    entrypoint:
      - sh
      - -c
      - cd admin && npm ci --ignore-scripts && npm run start:admin
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4200/admin', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      retries: 3
      start_period: 60s
      timeout: 5s
    image: node:24.1.0-bookworm-slim
    ports:
      - 4200:4200
    volumes:
      - .:/app:z
      - npm-cache:/root/.npm:z
      - /app/libs/node_modules
      - /app/admin/node_modules
    working_dir: /app

  api:
    container_name: api
    depends_on:
      db:
        condition: service_healthy
      init-libs:
        condition: service_completed_successfully
    entrypoint:
      - sh
      - -c
      - cd api && npm ci --ignore-scripts && npm run start:api
    environment:
      - DB_HOST=db
      - DB_NAME=fom
      - DB_PASSWORD=test
      - DB_SSL=false
      - DB_TESTDATA=true
      - DB_TYPE=postgres
      - DB_USERNAME=postgres
      - SECURITY_ENABLED=false
      - BYPASS_CORS=true
      - OBJECT_STORAGE_URL=nrs.objectstore.gov.bc.ca
      - OBJECT_STORAGE_ACCESS_ID=nr-fom-dev
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3333/api', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      retries: 3
      start_period: 60s
      timeout: 5s
    image: node:24.1.0-bookworm-slim
    ports:
      - 3333:3333
    volumes:
      - .:/app:z
      - npm-cache:/root/.npm:z
      - /app/libs/node_modules
      - /app/api/node_modules
    working_dir: /app

  db:
    container_name: db
    # Postgis with extensions (postgis_topology, fuzzystrmatch, postgis_tiger_geocoder)
    image: postgis/postgis:15-master
    # Add pgcrypto extension (sed) if not present (grep), then start normally (entrypoint)
    entrypoint:
      - sh
      - -c
      - grep -qxF 'CREATE EXTENSION IF NOT EXISTS pgcrypto'/docker-entrypoint-initdb.d/10_postgis.sh ||
        sed -i '/EXISTS postgis_tiger_geocoder;*/a CREATE EXTENSION IF NOT EXISTS pgcrypto;'
        /docker-entrypoint-initdb.d/10_postgis.sh &&
        /usr/local/bin/docker-entrypoint.sh postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=test
      - POSTGRES_DB=fom
      - POSTGRES_HOST_AUTH_METHOD=trust
      - POSTGRES_PORT=5342
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      retries: 3
      start_period: 30s
      timeout: 5s
    volumes:
      - postgres-data:/var/lib/postgres/data
    ports:
      - 5432:5432

  public:
    container_name: public
    depends_on:
      api:
        condition: service_healthy
      init-libs:
        condition: service_completed_successfully
    entrypoint:
      - sh
      - -c
      - cd public && npm ci --ignore-scripts && npm run start:public
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4300/public', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      retries: 3
      start_period: 60s
      timeout: 5s
    image: node:24.1.0-bookworm-slim
    ports:
      - 4300:4300
    volumes:
      - .:/app:z
      - npm-cache:/root/.npm:z
      - /app/libs/node_modules
      - /app/public/node_modules
    working_dir: /app
