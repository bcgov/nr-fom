name: Analysis

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, converted_to_draft]
  push:
    branches: [main]
  schedule:
    - cron: "30 8 1 * *" # 8:30 UDT = 12:30 PDT, runs monthly
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  tests-admin:
    name: Unit Tests (admin)
    if: (! github.event.pull_request.draft)
    runs-on: ubuntu-24.04
    steps:
      - uses: bcgov/action-test-and-analyse@v1.3.0
        with:
          commands: |
            cd ../libs && npm ci --ignore-scripts && cd -
            npm ci --ignore-scripts
            npm run test-unit
          dir: admin
          node_version: 20.18.1

  tests-api:
    name: Unit Tests (api)
    if: (! github.event.pull_request.draft)
    runs-on: ubuntu-24.04
    steps:
      - uses: bcgov/action-test-and-analyse@v2.0.0
        with:
          commands: |
            npm ci --ignore-scripts
            npm run test-unit
          dir: api
          node_version: 20.18.1
          sonar_args: >
            -Dsonar.exclusions=**/*.spec.ts
            -Dsonar.javascript.lcov.reportPaths=coverage/api/lcov.info   
            -Dsonar.organization=bcgov-sonarcloud
            -Dsonar.projectKey=nr-fom
          sonar_token: ${{ secrets.SONAR_TOKEN }}

  tests-public:
    name: Unit Tests (public)
    if: (! github.event.pull_request.draft)
    runs-on: ubuntu-24.04
    steps:
      - uses: bcgov/action-test-and-analyse@v1.3.0
        with:
          commands: |
            cd ../libs && npm ci --ignore-scripts && cd -
            npm ci --ignore-scripts
            npm run test-unit
          dir: public
          node_version: 20.18.1

  # https://github.com/marketplace/actions/aqua-security-trivy
  trivy:
    name: Trivy Security Scan
    if: (! github.event.pull_request.draft)
    permissions:
      security-events: write
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Run Trivy vulnerability scanner in repo mode
        uses: aquasecurity/trivy-action@0.35.0
        with:
          format: "sarif"
          output: "trivy-results.sarif"
          ignore-unfixed: true
          scan-type: "fs"
          scanners: "vuln,secret,config"
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-results.sarif"

  results:
    name: Analysis Results
    needs: [tests-admin, tests-api, tests-public, trivy]
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - if: contains(needs.*.result, 'failure')||contains(needs.*.result, 'canceled')
        run: echo "At least one job has failed." && exit 1
      - run: echo "Success!"
